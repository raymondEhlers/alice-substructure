    pp_R02:
        datasets:
            nominal:
                pp: *LHC17pq_pp_R02_mammoth
                pythia: *LHC18b8_pythia_R02_mammoth
            tracking_efficiency:
                pp: *LHC17pq_pp_R02_mammoth
                pythia: *LHC18b8_pythia_R02_mammoth_tracking_efficiency
        unfolding:
            suffix: "pp_R02"
            nominal_binning:
                default:
                    jet_pt:
                        "true": [0, 20, 40, 60, 80, 100, 120, 140, 160]
                        "smeared": [20, 30, 40, 50, 60, 85]
                    kt:
                        # NOTE: Default to untagged because there are identically zero
                        #       untagged for DyG.
                        # Default before April 2021:
                        #"true": [0., 0.5, 1, 2, 4, 6, 10]
                        #"smeared": [0.25, 0.25, 0.5, 1., 2., 4, 6]
                        # Post April 2021, the binning was modified to match the semi-central binning as much as possible.
                        # This was equal to "2_4_split" previously.
                        # "true": [0., 0.5, 1, 2, 3, 4, 6, 10]
                        # "smeared": [0.25, 0.25, 0.5, 1., 2., 3, 4, 6]
                        # In May 2021, we found out that SD z > 0.2 can unfold in semi-central down to low kt.
                        # So we need to further align the binning. Below is the additional alignment
                        # (namely, the 1-2 bin is split in two)
                        "true": [0., 0.25, 0.5, 1, 1.5, 2, 3, 4, 6, 10]
                        "smeared": [0.25, 0.25, 0.5, 1., 1.5, 2., 3, 4, 6]
                    delta_R:
                        # Using the theta_g binning from James, converted to Rg
                        # (Fig 32 in AN: https://alice-notes.web.cern.ch/system/files/notes/analysis/1069/2021-02-14-alice_rg_AN_PbPb.pdf)
                        # true theta_g: [-0.05, 0., 0.1, 0.15, 0.22, 0.3, 0.4, 0.5, 0.7, 1.0]
                        # obs_bins_det: [-0.05, 0., 0.1, 0.15, 0.22, 0.3, 0.4, 0.5, 0.7, 1.0]
                        # (NOTE: Untagged is using my values...)
                        "true": [-0.05, 0, 0.02, 0.03, 0.044, 0.06, 0.08, 0.1, 0.14 , 0.2]
                        "smeared": [-0.05, 0, 0.02, 0.03, 0.044, 0.06, 0.08, 0.1, 0.14 , 0.2]
                        jet_pt:
                            # From Laura, pg 30
                            "true": [0, 20, 40, 60, 80, 100, 140, 160]
                            "smeared": [40, 50, 60, 70, 80, 90, 120]
                        # TODO: Is this really the right place?
                        #       It's grooming method dependent, so it needs something like this...
                        additional_substructure_variable_cut:
                            variable_name: "kt"
                            min: 1.0
                            max: 1e6
                soft_drop_z_cut_02:
                    kt: &_pp_R02_kt_binning_with_untagged_bin
                        # Same as above, but we include the untagged bin because it's meaningful for SD z > 0.2
                        "true": [-0.05, 0., 0.25, 0.5, 1, 1.5, 2, 3, 4, 6, 10]
                        "smeared": [0, 0.25, 0.5, 1., 1.5, 2., 3, 4, 6]
                soft_drop_z_cut_04:
                    kt:
                        <<: *_pp_R02_kt_binning_with_untagged_bin
                dynamical_core_z_cut_02:
                    kt:
                        <<: *_pp_R02_kt_binning_with_untagged_bin
                dynamical_kt_z_cut_02:
                    kt:
                        <<: *_pp_R02_kt_binning_with_untagged_bin
                dynamical_time_z_cut_02:
                    kt:
                        <<: *_pp_R02_kt_binning_with_untagged_bin
            settings:
                default:
                    label: ""
                    closures: true
                    closure_settings:
                        split_MC_fraction_for_response: 0.75
                        # TODO: Optimize factor.
                        # It seems to be about 1 in 7200. Round to 1 in 1000
                        #split_MC_fraction_for_response: 0.999
                        max_untagged_bin: 10
                    reweight_prior: false
                    datasets: "nominal"
                # NOTE: We skip reweighting the prior for pp. Instead, we use HERWIG for model dependence.
                #       However, we still create the configuration, because it can useful as a stand in for some cases.
                reweight_prior:
                    label: "reweight_prior"
                    closures: false
                    reweight_prior: true
                    datasets: "nominal"
                peter_binning:
                    label: "peter_binning"
                    closures: false
                    reweight_prior: false
                    datasets: "nominal"
                    binning:
                        default:
                            kt:
                                # Merge Peter's binning with kt cut
                                "true": [0., 0.25, 0.5, 1, 1.5, 2.25, 3.5, 6, 10]
                                "smeared": [0.25, 0.25, 0.5, 1., 1.5, 2.25, 3.5, 6]
                        soft_drop_z_cut_02:
                            kt: &_pp_R02_kt_binning_with_untagged_bin_Peter_suggested
                                "true": [-0.05, 0., 0.25, 0.5, 1, 1.5, 2.25, 3.5, 6, 10]
                                "smeared": [0, 0.25, 0.5, 1., 1.5, 2.25, 3.5, 6]
                        soft_drop_z_cut_04:
                            kt:
                                <<: *_pp_R02_kt_binning_with_untagged_bin_Peter_suggested
                        dynamical_core_z_cut_02:
                            kt:
                                <<: *_pp_R02_kt_binning_with_untagged_bin_Peter_suggested
                        dynamical_kt_z_cut_02:
                            kt:
                                <<: *_pp_R02_kt_binning_with_untagged_bin_Peter_suggested
                        dynamical_time_z_cut_02:
                            kt:
                                <<: *_pp_R02_kt_binning_with_untagged_bin_Peter_suggested
                # Systematics
                tracking_efficiency:
                    label: "tracking_efficiency"
                    closures: false
                    reweight_prior: false
                    datasets: "tracking_efficiency"
                truncation_low:
                    label: "truncation"
                    closures: false
                    reweight_prior: false
                    datasets: "nominal"
                    binning:
                        default:
                            jet_pt:
                                "smeared": [17, 30, 40, 50, 60, 85]
                truncation_high:
                    label: "truncation"
                    closures: false
                    reweight_prior: false
                    datasets: "nominal"
                    binning:
                        default:
                            jet_pt:
                                "smeared": [23, 30, 40, 50, 60, 85]
                random_binning:
                    label: "random_binning"
                    closures: false
                    reweight_prior: false
                    datasets: "nominal"
                    binning:
                        default:
                            kt:
                                # Old binning without 1-2 split
                                # In [2]: r = np.random.random_sample(5) / 10 + 0.95
                                # In [3]: r
                                # Out[3]: array([0.98581109, 0.96994222, 1.00046462, 1.00756936, 0.99298099])
                                # In [4]: np.round(r * [0.5, 1., 2., 3, 4], 2)
                                # Out[4]: array([0.49, 0.97, 2.  , 3.02, 3.97])
                                # New binning with 1-1.5, 1.5-2:
                                # In [2]: r = np.random.random_sample(6) / 10 + 0.95
                                # In [3]: r
                                # Out[3]: array([1.04331531, 0.97083215, 1.01600213, 1.02748796, 1.00464514, 0.99907002])
                                # In [4]: np.round(r * [0.5, 1., 1.5, 2., 3, 4], 2)
                                # Out[4]: array([0.52, 0.97, 1.52, 2.05, 3.01, 4.  ])
                                "smeared": [0.25, 0.25, 0.52, 0.97, 1.52, 2.05, 3.01, 4., 6]
                        soft_drop_z_cut_02:
                            kt: &_pp_R02_kt_random_binning_with_untagged_bin
                                # Same as above, but including the untagged bin.
                                "smeared": [0, 0.25, 0.52, 0.97, 1.52, 2.05, 3.01, 4., 6]
                        soft_drop_z_cut_04:
                            kt:
                                <<: *_pp_R02_kt_random_binning_with_untagged_bin
                        dynamical_core_z_cut_02:
                            kt:
                                <<: *_pp_R02_kt_random_binning_with_untagged_bin
                        dynamical_kt_z_cut_02:
                            kt:
                                <<: *_pp_R02_kt_random_binning_with_untagged_bin
                        dynamical_time_z_cut_02:
                            kt:
                                <<: *_pp_R02_kt_random_binning_with_untagged_bin


