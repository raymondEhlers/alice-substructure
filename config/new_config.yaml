    1: 16.0695
    2: 4.60776
    3: 2.14894
    4: 0.781811
    5: 0.26462
    6: 0.0975008
    7: 0.0292782
    8: 0.00988435
    9: 0.0040435
    10: 0.00135313
    11: 0.000529795
    12: 0.000188235
    13: 9.22016e-05
    14: 4.29112e-05
    15: 2.09133e-05
    16: 1.06058e-05
    17: 5.74855e-06
    18: 3.0036e-06
    19: 1.61604e-06
    20: 2.0978e-06

available_datasets:
    # pp
    # pp R = 0.4
    LHC17pq_pp_R04_1998_1999:
        # NOTE: 22 January 2021: This dataset uses the jagged constituent indices from early versions
        #       of the substructure task. Although this maps nicely onto indexed arrays in awkward,
        #       it's probably not worth the effort right now. Instead, I'll just re-run this train.
        # NOTE: Repairing this dataset requires an older version of AliPhysics. If it has the current
        #       version with the updated tree layout, it will corrupt rewriting the file. I suppose
        #       the issue is that it reads with the proper class version, but then tries to update
        #       the most recent version (which doesn't work, because there is no procedure for conversion).
        #       I suspect this issue would be more obvious, except that we reused the fConstituentIndices
        #       name in the tree, so it blindly tries to write one type of branch as another type.
        #       However, we must use AliPhysics because otherwise it doesn't understand AliEmcalList...
        #       So this is a catch 22! :-(
        #
        #       Fortunately, since the output is small and doesn't appear to have any corruption issues
        #       in the tree, we can symlink the original files as the "repaired" files and call it a day.
        name: "LHC17pq_pp_R04_1788_1789"
        tree_name: "AliAnalysisTaskJetDynamicalGrooming_RawTree_Data_NoSub_Incl"
        # Map for the uniform prefix name to the analysis task prefix.
        # The map feels a bit backwards, but it simplifies the interface substantially.
        prefixes:
            data: "data"
        # Branches which don't contain a prefix
        branches: []
        # Branches which contain a prefix. The prefix will be filled for each prefix defined above.
        prefix_branches:
            - "{prefix}.fJetPt"
            - "{prefix}.fJetConstituents.fPt"
            - "{prefix}.fJetConstituents.fEta"
            - "{prefix}.fJetConstituents.fPhi"
            # Older production...
            - "{prefix}.fJetConstituents.fGlobalIndex"
            - "{prefix}.fJetSplittings.fKt"
            - "{prefix}.fJetSplittings.fDeltaR"
            - "{prefix}.fJetSplittings.fZ"
            - "{prefix}.fJetSplittings.fParentIndex"
            - "{prefix}.fSubjets.fPartOfIterativeSplitting"
            - "{prefix}.fSubjets.fSplittingNodeIndex"
            - "{prefix}.fSubjets.fConstituentIndices"
            # (Much) older production...
            - "{prefix}.fSubjets.fConstituentJaggedIndices"
        jet_R: 0.4
        files:
            - "trains/pp/1788/AnalysisResults.*.repaired.root"
            - "trains/pp/1789/AnalysisResults.*.repaired.root"
