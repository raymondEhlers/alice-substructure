---
datasets:
    PbPb:
        dataset:
            name: "LHC18qr"
            branches:
                - "data.fJetPt"
                - "data.fKt"
                - "data.fDeltaR"
                - "data.fZ"
    embedPythia:
        dataset:
            name: "LHC18b8_embedded_into_LHC18qr"
    pp:
        dataset:
            name: "LHC17pq"
            branches:
                - "data.fJetPt"
                - "data.fJetConstituents.fPt"
                - "data.fJetConstituents.fEta"
                - "data.fJetConstituents.fPhi"
                - "data.fJetConstituents.fGlobalIndex"
                - "data.fJetSplittings.fKt"
                - "data.fJetSplittings.fDeltaR"
                - "data.fJetSplittings.fZ"
                - "data.fJetSplittings.fParentIndex"
                - "data.fSubjets.fPartOfIterativeSplitting"
                - "data.fSubjets.fSplittingNodeIndex"
                - "data.fSubjets.fConstituentIndices"
                - "data.fSubjets.fConstituentJaggedIndices"
    pythia:
        dataset:
            name: "LHC18b8"
            branches:
                - "data.fJetPt"
                - "data.fJetConstituents.fPt"
                - "data.fJetConstituents.fEta"
                - "data.fJetConstituents.fPhi"
                - "data.fJetConstituents.fGlobalIndex"
                - "data.fJetSplittings.fKt"
                - "data.fJetSplittings.fDeltaR"
                - "data.fJetSplittings.fZ"
