[tool.poetry]
name = "jet_substructure"
version = "0.1.0"
description = "Jet substructure analysis code"
authors = ["Raymond Ehlers <raymond.ehlers@cern.ch>"]
license = "BSD-3-Clause"
include = [
    "jet_substructure/py.typed",
]

[tool.poetry.scripts]
embedPythia = "jet_substructure.analysis.analyze_tree:embed_pythia_entry_point"
splitTree = "jet_substructure.base.helpers:split_tree_entry_point"
mergeROOTFiles = "jet_substructure.base.helpers:merge_ROOT_files_entry_point"
skimDataset = "jet_substructure.analysis.skim_to_flat_tree:skim_entry_point"
processEmbeddingSkim = "jet_substructure.analysis.data_frame:process_embedding_skim_entry_point"

[tool.poetry.dependencies]
python = "^3.6.1"
numpy = "^1.18.1"
uproot = "^3.11.2"
pandas = "^1.0.1"
attrs = "^19.3.0"
matplotlib = "^3.1.3"
boost_histogram = "^0.6.2"
pachyderm = {path = "../pachyderm"}
h5py = "^2.10.0"
coloredlogs = "^14.0"
dask = {extras = ["dataframe"], version = "^2.14.0"}
enlighten = "^1.4.0"
pathos = "^0.2.5"
seaborn = "^0.10.1"

[tool.poetry.dev-dependencies]
mypy = "^0.761"
pytest = "^5.3.5"
flake8 = "^3.7.9"
flake8-colors = "^0.1.6"
black = "^19.10b0"
pre-commit = "^2.0.1"
yamllint = "^1.20.0"
isort = {extras = ["toml"], version = "^4.3.21"}
IPython = "^7.12.0"
jupyterlab = "^1.2.6"
jupyter_nbextensions_configurator = "^0.4.1"
# Not explictily enabled because it needs graphviz to be install separately via apt, brew, etc.
#pygraphviz = "^1.5"
networkx = "^2.4"

[tool.isort]
known_standard_library = ["setuptools", "typing_extensions"]
known_third_party = ["IPython", "ROOT", "attr", "awkward", "awkward1", "boost_histogram", "coloredlogs", "dill", "enlighten", "h5py", "matplotlib", "numpy", "pachyderm", "pandas", "pathos", "seaborn", "uproot", "uproot_methods"]
known_first_party = []
line_length = 120
# Meaning a grouped grid of imports
multi_line_output = 3
lines_after_imports = 2
force_grid_wrap = 0
use_parentheses = true
include_trailing_comma = true
verbose = true
skip = ["docs/conf.py"]
skip_glob = ".*"

[tool.black]
line-length = 120

[build-system]
requires = ["poetry>=0.12"]
build-backend = "poetry.masonry.api"
